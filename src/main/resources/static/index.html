<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Empleados - SENA ADSO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 40px; }
        .card { border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header-app { background: #2c3e50; color: white; padding: 20px; border-radius: 8px 8px 0 0; }
    </style>
</head>
<body>
    <div class="container card p-0">
        <div class="header-app text-center">
            <h2>Sistema de Gestión de Talento Humano</h2>
            <p>Módulo de Registro y Consulta</p>
        </div>
        
        <div class="p-4">
            <h4 class="mb-3">Registro de Colaboradores (HU01)</h4>
            <form class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre Completo</label>
                    <input type="text" class="form-control" id="nombre" placeholder="Ej. Estrellita Quintero">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Tipo de ID</label>
                    <select class="form-select" id="tipo_identificacion">
                        <option value="CC">CC</option>
                        <option value="CE">CE</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Número Identificación</label>
                    <input type="text" class="form-control" id="identificacion" placeholder="Sin puntos">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-control" id="correo_electronico" placeholder="nombre@correo.com">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Dependencia</label>
                    <input type="text" class="form-control" id="dependencia" placeholder="Ej. Administrativa">
                </div>
                <div class="col-12">
                    <label class="form-label">Dirección de Residencia</label>
                    <input type="text" class="form-control" id="direccion" placeholder="Calle, Carrera, Ciudad">
                </div>
                <div class="col-12 text-end">
                    <button type="button" class="btn btn-success px-4">Guardar Empleado</button>
                </div>
            </form>

            <hr class="my-5">

            <h4 class="mb-3">Listado de Nómina (HU02)</h4>
                <div class="table-responsive">
                    <table class="table table-hover table-bordered">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Tipo ID</th>
                                <th>Identificación</th>
                                <th>Dirección</th>
                                <th>Dependencia</th>
                                <th>Correo Electrónico</th>
                            </tr>
                        </thead>
                        <tbody id="tablaCuerpo">
                            </tbody>
                    </table>
                </div>
        </div>
    </div>
</body>
</html>
